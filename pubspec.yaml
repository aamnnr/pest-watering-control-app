name: pestmist_control
description: Aplikasi kontrol pest misting

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5
  mqtt_client: ^10.4.0
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.2
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  permission_handler: ^12.0.1
  json_annotation: ^4.9.0
  get_it: ^9.2.1
  logger: ^2.7.0
  connectivity_plus: ^7.1.1
  flutter_blue_plus: ^2.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.14.4

# Konfigurasi pembuatan icon aplikasi otomatis
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#FFFFFF"

flutter:
  uses-material-design: true

  # Pastikan folder assets terdaftar agar file icon terbaca
  assets:
    - assets/icon/